    <style>
      .inputs {
        width: 50%;
        margin: 0;
        padding: 0;
      }

      .input {
        border-radius: 50px;
        height: 150px;
      }

      #output {
        width: 50%;
        border: none;
        outline: none;
        background-color: white;
        height: 450px;
        border-radius: 0px 10px 10px 0px;
      }

      textarea {
        outline: none;
        resize: none;
        border: none;
        height: 150px;
        cursor: text;
        color: white;
        width: 100%;
        padding-inline: 5%;
        padding-block: 25px;
        background-color: rgb(15, 15, 15);
        font-size: 20px;
        font-family: Arial, Helvetica, sans-serif;
        border: none;
        overflow: auto;
      }

      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
      }

      .ad-container {
        width: 100%;
        display: flex;
        justify-content: center;
        height: 230px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-block: 20px;
        position: relative;
        border: 1px solid gray;
        margin-block: 30px;
        border-radius: 10px;
      }

      .ad-container::after {
        content: "ADVERTISEMENT";
        width: 10%;
        color: gray;
        position: absolute;
        left: 45%;
        top: 110px;
        font-size: 13px;
        text-align: center;
      }

      .ad-container ins {
        height: 100%;
        width: 100%;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
